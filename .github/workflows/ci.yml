name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build, lint & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: security-guard — no cookie access allowed
        run: |
          set +e
          matches="$(grep -rnE "user_session|\.cookies\(|cookie[_-]?store" src/)"
          status=$?
          set -e
          if [[ ${status} -eq 0 ]]; then
            echo "::error::Found cookie-related code in src/ — pr-media must never touch cookies, only scoped gh/API tokens."
            echo "${matches}"
            exit 1
          fi
          echo "No cookie-related patterns found in src/."

name: 'pr-media-cleanup'
description: >-
  Deletes the hidden git ref (refs/uploads/pr/<N>) and the prerelease
  (pr-<N>-media) created by pr-media once the corresponding pull request is
  closed. Both deletions are best-effort: a missing artifact (404) is not
  treated as an error.
author: 'pr-media'

inputs:
  github-token:
    description: 'Token used to call the GitHub API. Needs a token with contents:write on this repository.'
    required: false
    default: ${{ github.token }}

runs:
  using: 'composite'
  steps:
    - name: Remove pr-media artifacts for this PR
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        EVENT_NAME: ${{ github.event_name }}
        EVENT_ACTION: ${{ github.event.action }}
      run: |
        set -euo pipefail

        # Guard rails: only act on a closed pull request. This makes the
        # action safe to include even if the caller's workflow trigger is
        # broader than `pull_request: types: [closed]`.
        if [[ "${EVENT_NAME}" != "pull_request" && "${EVENT_NAME}" != "pull_request_target" ]]; then
          echo "pr-media-cleanup: event is '${EVENT_NAME}', not a pull_request event — skipping." >&2
          exit 0
        fi
        if [[ "${EVENT_ACTION}" != "closed" ]]; then
          echo "pr-media-cleanup: PR action is '${EVENT_ACTION}', not 'closed' — skipping." >&2
          exit 0
        fi
        if [[ -z "${PR_NUMBER}" || "${PR_NUMBER}" == "null" ]]; then
          echo "pr-media-cleanup: could not determine the pull request number — skipping." >&2
          exit 0
        fi

        REF_PATH="repos/${REPO}/git/refs/uploads/pr/${PR_NUMBER}"
        RELEASE_TAG="pr-${PR_NUMBER}-media"

        echo "pr-media-cleanup: deleting ref refs/uploads/pr/${PR_NUMBER} (if present)..."
        if err=$(gh api -X DELETE "${REF_PATH}" 2>&1); then
          echo "pr-media-cleanup: hidden ref deleted."
        elif printf '%s' "${err}" | grep -qi '404\|not found'; then
          echo "pr-media-cleanup: no hidden ref to delete."
        else
          echo "pr-media-cleanup: failed to delete hidden ref:" >&2
          printf '%s\n' "${err}" >&2
          exit 1
        fi

        echo "pr-media-cleanup: deleting release ${RELEASE_TAG} (if present)..."
        if err=$(gh release delete "${RELEASE_TAG}" --repo "${REPO}" --yes --cleanup-tag 2>&1); then
          echo "pr-media-cleanup: release deleted."
        elif printf '%s' "${err}" | grep -qi '404\|not found\|release not found'; then
          echo "pr-media-cleanup: no release to delete."
        else
          echo "pr-media-cleanup: failed to delete release:" >&2
          printf '%s\n' "${err}" >&2
          exit 1
        fi
